<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Shibumi Stack</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="/page-transitions.css">
    <style data-page>
        .lost {
            display: grid;
            place-content: center;
            min-height: calc(100svh - 12rem);
            text-align: center;
        }

        .lost h1 {
            margin: 0;
            font-size: clamp(5rem, 12vw, 10rem);
            line-height: 0.88;
            letter-spacing: -0.065em;
            font-weight: 400;
        }

        .lost p {
            margin: 1.5rem 0 0;
            color: var(--muted);
            font-size: clamp(1.08rem, 1.55vw, 1.28rem);
            line-height: 1.6;
        }

        .lost a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid light-dark(rgba(161, 75, 44, 0.35), rgba(199, 102, 71, 0.35));
        }

        .lost a:hover {
            border-bottom-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="shell">
        <!-- shibumi-nav -->

        <main>
            <section class="lost">
                <div>
                    <h1>404<span class="dot">.</span></h1>
                    <p>Nothing here. Try the <a href="/">home page</a> or <a href="/docs">docs</a>.</p>
                </div>
            </section>
        </main>

        <!-- shibumi-footer -->
    </div>
    <script src="/page-transitions.js"></script>
</body>
</html>
