<dialog class="install-dialog" id="install-dialog">
  <div class="install-dialog-content">
    <div class="install-dialog-head">
      <span class="kanji">渋み</span>
      <span>Get started</span>
    </div>
    <p class="install-dialog-hint">When we have the package, you'll run this in your terminal to scaffold a new project.</p>
    <!--<p class="install-dialog-hint">Run this in your terminal to scaffold a new project.</p>-->
    <div class="install-dialog-command">
      <span class="prompt-mark">›</span>
      <code>bun create shibumi@latest</code>
      <button class="copy-command" type="button" data-copy="bun create shibumi@latest" aria-label="Copy install command">{{icon(copy)}}{{icon(check)}}</button>
    </div>
    <p class="install-dialog-alt">or <code>npm create shibumi@latest</code></p>
  </div>
</dialog>
