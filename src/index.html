    <style>
	:root {
	    --color: rgba(243, 237, 226, 0.3);
	}
        * {

            padding: 0;

        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;

            height: 100vh;
            display: grid;

	    overflow: hidden;
        }

        }
        
        h1 {
            color: var(--color);
            font-size: clamp(2rem, 5vw, 3rem);

        }
	b {

	}
